<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Нова заявка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#1a1d26;--surface2:#222535;--border:#2e3347;
  --accent:#4f7cff;--accent2:#00d4aa;
  --text:#e8eaf2;--text2:#8b90a7;--text3:#555a72;
  --green:#00d4aa;--red:#ff5c5c;--yellow:#ffb84d;
  --radius:10px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
body{padding-bottom:80px;overflow-y:auto}

/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.hdr-icon{width:40px;height:40px;border-radius:9px;background:rgba(79,124,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:600;color:var(--text)}
.hdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}

/* Sections */
.content{padding:12px 12px 0}
.sec-lbl{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px 2px}
.sec-lbl:first-child{margin-top:0}

/* Field card */
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:2px}
.frow{display:flex;align-items:center;min-height:46px;padding:0 14px;border-bottom:.5px solid var(--border);gap:10px;position:relative}
.frow:last-child{border-bottom:none}
.flbl{font-size:13px;color:var(--text2);min-width:110px;flex-shrink:0}
.flbl.req::after{content:' *';color:var(--red)}
.frow input,.frow select{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font);text-align:right;min-width:0;padding:12px 0}
.frow input::placeholder{color:var(--text3)}
.frow input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* City search */
.city-wrap{flex:1;position:relative}
.city-inp{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font);text-align:right;padding:12px 0}
.city-inp::placeholder{color:var(--text3)}
.city-drop{position:absolute;right:0;top:100%;background:var(--surface);border:1px solid var(--accent);border-radius:0 0 8px 8px;z-index:9999;display:none;min-width:180px;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.city-drop.show{display:block}
.city-opt{padding:11px 14px;font-size:14px;color:var(--text);cursor:pointer;border-bottom:.5px solid var(--border)}
.city-opt:last-child{border-bottom:none}
.city-opt:active,.city-opt:hover{background:var(--surface2);color:var(--accent)}
.city-opt mark{background:transparent;color:var(--accent);font-weight:600}

/* Chips (multi) */
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:12px 14px}
.chip{font-size:13px;padding:7px 13px;border-radius:20px;background:var(--surface2);border:.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;font-family:var(--font)}
.chip.on{background:rgba(79,124,255,.15);border-color:var(--accent);color:var(--accent);font-weight:600}

/* Switcher */
.switcher{display:flex;background:var(--surface2);border:.5px solid var(--border);border-radius:8px;padding:3px;margin-bottom:4px}
.sw-btn{flex:1;text-align:center;padding:8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;user-select:none}
.sw-btn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* Price rows */
.price-row{display:flex;align-items:center;padding:11px 14px;border-bottom:.5px solid var(--border);gap:10px}
.price-row:last-child{border-bottom:none}
.p-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.p-check.on{background:var(--accent);border-color:var(--accent)}
.p-check.on::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.p-lbl{font-size:13px;color:var(--text);min-width:70px;cursor:pointer}
.p-inp{flex:1;display:flex;align-items:center;gap:5px;justify-content:flex-end}
.p-inp input{background:var(--surface2);border:.5px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:14px;width:90px;text-align:right;outline:none;font-family:var(--mono);transition:opacity .15s}
.p-inp input:disabled{opacity:.3}
.p-cur{font-size:12px;color:var(--text3)}

/* Error */
.err{background:rgba(255,92,92,.1);border:.5px solid rgba(255,92,92,.4);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:8px;display:none}
.err.show{display:block}

/* Submit bar */
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 12px;background:rgba(15,17,23,.96);border-top:.5px solid var(--border);backdrop-filter:blur(10px);z-index:100}
.submit-btn{width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:16px;font-weight:600;padding:14px;cursor:pointer;transition:opacity .15s}
.submit-btn:disabled{opacity:.4;cursor:default}
.submit-btn:active{opacity:.85}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">📦</div>
  <div>
    <div class="hdr-title">Нова заявка</div>
    <div class="hdr-sub">Заповніть і відправте</div>
  </div>
</div>

<div class="content">

  <!-- МАРШРУТ -->
  <div class="sec-lbl">Маршрут</div>
  <div class="fcard">
    <div class="frow">
      <span class="flbl req">Звідки</span>
      <div class="city-wrap">
        <input class="city-inp" id="city_from" placeholder="Місто або село" autocomplete="off"
          oninput="citySearch(this,'drop-from')" onblur="delayHide('drop-from')" onkeydown="cityKey(event,'drop-from')">
        <div class="city-drop" id="drop-from"></div>
      </div>
    </div>
    <div class="frow">
      <span class="flbl req">Куди</span>
      <div class="city-wrap">
        <input class="city-inp" id="city_to" placeholder="Місто або село" autocomplete="off"
          oninput="citySearch(this,'drop-to')" onblur="delayHide('drop-to')" onkeydown="cityKey(event,'drop-to')">
        <div class="city-drop" id="drop-to"></div>
      </div>
    </div>
    <div class="frow">
      <span class="flbl">Відстань</span>
      <input type="number" id="distance" placeholder="км" inputmode="numeric">
    </div>
  </div>

  <!-- ВАНТАЖ -->
  <div class="sec-lbl">Вантаж</div>
  <div class="fcard">
    <div class="frow">
      <span class="flbl req">Вантаж</span>
      <input type="text" id="cargo" placeholder="Зерно, соняшник..." autocomplete="off" oninput="capFirst(this)">
    </div>
    <div class="frow">
      <span class="flbl req">Вага, т</span>
      <input type="number" id="weight" placeholder="0.0" inputmode="decimal" step="0.1">
    </div>
    <div class="frow">
      <span class="flbl">К-сть авто</span>
      <input type="number" id="car_count" placeholder="1" inputmode="numeric" value="1">
    </div>
  </div>

  <!-- ТИП АВТО -->
  <div class="sec-lbl">Тип авто <span style="color:var(--red)">*</span></div>
  <div class="fcard">
    <div class="chips" id="truck-chips"></div>
  </div>

  <!-- ЦІНА -->
  <div class="sec-lbl">Ціна (необов'язково)</div>
  <div class="fcard" id="price-rows"></div>

  <!-- КОНТАКТ -->
  <div class="sec-lbl">Контакт для зв'язку</div>
  <div class="switcher">
    <div class="sw-btn on" id="sw-my" onclick="setContact('my')">📱 Мій номер</div>
    <div class="sw-btn" id="sw-other" onclick="setContact('other')">✏️ Інший номер</div>
  </div>
  <div class="fcard" id="custom-phone-card" style="display:none">
    <div class="frow">
      <span class="flbl">Телефон</span>
      <input type="tel" id="custom_phone" placeholder="+380..." inputmode="tel">
    </div>
    <div class="frow">
      <span class="flbl">Ім'я</span>
      <input type="text" id="custom_name" placeholder="Ваше ім'я" oninput="capFirst(this)">
    </div>
  </div>

  <div class="err" id="err-box"></div>

</div>

<div class="submit-bar">
  <button class="submit-btn" id="save-btn" onclick="submit()">Подати заявку</button>
</div>

<script>

  'Маріуполь','Мелітополь','Миколаїв','Миргород','Мукачево','Нетішин','Ніжин','Нікополь','Нова Каховка',

  'Перемишляни','Переяслав','Полтава','Попасна','Прилуки','Рівне','Рогатин','Ромни','Рубіжне','Саки',

  'Жашків','Чорноморськ','Очаків','Южне','Южноукраїнськ','Вознесенськ','Первомайськ','Балта',
  'Котовськ','Подільськ','Роздільна','Кодима','Ананьїв','Арциз','Болград','Ізмаїл','Кілія','Татарбунари',

  'Фастів','Боярка','Яготин','Богуслав','Біла Церква','Ржищів','Українка',

  'Хорол','Карлівка','Нові Санжари','Кобеляки','Чутове','Глобине','Семенівка',

  'Луцьк','Ковель','Нововолинськ','Кам\'янка-Бузька','Червоноград','Стрий','Дрогобич','Трускавець','Самбір',
  'Борислав','Мукачево','Берегове','Ужгород','Хуст','Іршава','Перечин','Свалява','Тячів','Виноградів',
  'Чернівці','Кіцмань','Новодністровськ','Заставна','Вижниця','Сторожинець','Хотин','Снятин',
  'Івано-Франківськ','Калуш','Коломия','Яремче','Надвірна','Долина','Болехів','Галич','Рогатин','Тлумач',
  'Чернігів','Ніжин','Прилуки','Бахмач','Новгород-Сіверський','Борзна','Ічня','Козелець','Остер','Семенівка',
  'Сосниця','Корюківка','Мена','Щорс',

  'Луганськ','Лисичанськ','Сєвєродонецьк','Рубіжне','Стаханов','Алчевськ','Антрацит',

let st = {trucks:[], contact:'my'};

// Ініціалізація чіпів
document.getElementById('truck-chips').innerHTML = TRUCKS.map(t=>
  `<div class="chip" data-t="${t}" onclick="togTruck('${t}')">${t}</div>`
).join('');

// Ціни
document.getElementById('price-rows').innerHTML = PRICES.map(p=>`
  <div class="price-row">
    <div class="p-check" id="pc-${p.k}" onclick="togPrice('${p.k}')"></div>
    <div class="p-lbl" onclick="togPrice('${p.k}')">${p.l}</div>
    <div class="p-inp">
      <input type="number" id="pi-${p.k}" placeholder="0" inputmode="numeric" disabled>
      <span class="p-cur">грн/т</span>
    </div>
  </div>
`).join('');

function togTruck(t){
  const idx=st.trucks.indexOf(t);
  if(idx>=0) st.trucks.splice(idx,1); else st.trucks.push(t);
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',st.trucks.includes(c.dataset.t)));
}

function togPrice(k){
  const c=document.getElementById('pc-'+k), inp=document.getElementById('pi-'+k);
  const on=c.classList.toggle('on');
  inp.disabled=!on;
  if(on) inp.focus(); else inp.value='';
}

function setContact(m){
  st.contact=m;
  document.getElementById('sw-my').classList.toggle('on',m==='my');
  document.getElementById('sw-other').classList.toggle('on',m==='other');
  document.getElementById('custom-phone-card').style.display=m==='other'?'block':'none';
}

function capFirst(inp){
  const v=inp.value;
  if(v.length>0) inp.value=v.charAt(0).toUpperCase()+v.slice(1);
}

// City search
function citySearch(inp, dropId){
  const q=inp.value.trim();
  const drop=document.getElementById(dropId);
  if(q.length<1){drop.classList.remove('show');return;}
  const qn=q.toLowerCase();
  const res=CITIES.filter(c=>c.toLowerCase().startsWith(qn)).slice(0,8);
  if(!res.length){drop.classList.remove('show');return;}
  drop.innerHTML=res.map(c=>{
    const hi=`<mark>${c.slice(0,q.length)}</mark>${c.slice(q.length)}`;
    return `<div class="city-opt" onmousedown="pickCity('${c}','${inp.id}','${dropId}')">${hi}</div>`;
  }).join('');
  drop.classList.add('show');
  // Капіталізація
  capFirst(inp);
}

function pickCity(city, inpId, dropId){
  const inp=document.getElementById(inpId);
  inp.value=city;
  document.getElementById(dropId).classList.remove('show');
  inp.blur();
  // Ховаємо клавіатуру
  inp.blur();
}

function delayHide(dropId){
  setTimeout(()=>document.getElementById(dropId).classList.remove('show'),150);
}

function cityKey(e, dropId){
  if(e.key==='Enter'||e.key==='Tab'){
    const drop=document.getElementById(dropId);
    const first=drop.querySelector('.city-opt');
    if(first) first.dispatchEvent(new MouseEvent('mousedown'));
    e.preventDefault();
    // Ховаємо клавіатуру після Enter
    e.target.blur();
  }
}

// Ховаємо клавіатуру при скролі
document.addEventListener('touchmove',()=>{
  if(document.activeElement&&document.activeElement.tagName==='INPUT'){
    document.activeElement.blur();
  }
},{passive:true});

function getPriceVal(k){
  const c=document.getElementById('pc-'+k);
  return c&&c.classList.contains('on')?document.getElementById('pi-'+k).value.trim():'';
}

function showErr(msg){
  const el=document.getElementById('err-box');
  el.textContent='⚠️ '+msg;
  el.classList.add('show');
  el.scrollIntoView({behavior:'smooth',block:'center'});
}
function clearErr(){document.getElementById('err-box').classList.remove('show');}

async function submit(){
  clearErr();
  const cf=document.getElementById('city_from').value.trim();
  const ct=document.getElementById('city_to').value.trim();
  const cargo=document.getElementById('cargo').value.trim();
  const weight=document.getElementById('weight').value.trim();

  if(!cf) return showErr('Введіть місто відправлення');
  if(!ct) return showErr('Введіть місто призначення');
  if(!cargo) return showErr('Введіть тип вантажу');
  if(!weight) return showErr('Введіть вагу');
  if(!st.trucks.length) return showErr('Оберіть тип авто');
  if(st.contact==='other'){
    const ph=document.getElementById('custom_phone').value.trim();
    if(!ph) return showErr('Введіть контактний номер');
    if(ph.replace(/\D/g,'').length<10) return showErr('Невірний формат номера');
  }

  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Відправляємо...';

  const payload={
    telegram_id: tgUser.id||0,
    region_from:'', city_from:cf,
    region_to:'',   city_to:ct,
    distance: document.getElementById('distance').value.trim()||null,
    cargo,
    weight,
    truck_type: st.trucks.join(', '),
    car_count:  document.getElementById('car_count').value||1,
    price_fop:  getPriceVal('fop'),
    price_ndv:  getPriceVal('ndv'),
    price_nal:  getPriceVal('nal'),
    price_card: getPriceVal('card'),
    contact_phone: st.contact==='other'?document.getElementById('custom_phone').value.replace(/\D/g,''):'',
    contact_name:  st.contact==='other'?(document.getElementById('custom_name').value.trim()||tgUser.first_name||''):(tgUser.first_name||''),
    contact_changed: st.contact==='other',
  };

  try{
    const r=await fetch(`${API}/api/save_logist_order`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const res=await r.json();
    if(res.status==='ok'){
      tg.sendData(JSON.stringify({action:'order_submitted',order_id:res.order_id,order_num:res.order_num}));
      tg.close();
    } else {
      const msgs={daily_limit:'Досягнуто ліміт 5 заявок на день',duplicate_route:'Такий маршрут вже є сьогодні',not_logist:'Ця функція тільки для логістів'};
      showErr(msgs[res.message]||('Помилка: '+(res.message||'невідома')));
      btn.disabled=false; btn.textContent='Подати заявку';
    }
  }catch(e){
    showErr('Помилка з\'єднання. Спробуйте ще раз.');
    btn.disabled=false; btn.textContent='Подати заявку';
  }
}
</script>
</body>
</html>
