<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ціна</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f2f8;--border:#e2e6f0;--border2:#c8cede;
  --accent:#185FA5;--accent-light:#E6F1FB;--accent2:#1D9E75;--accent2-light:#E1F5EE;
  --text:#1a1d2e;--text2:#5a6080;--text3:#9aa0bb;
  --green:#1D9E75;--yellow:#BA7517;--yellow-bg:#FAEEDA;--red:#A32D2D;--red-bg:#FCEBEB;
  --radius:12px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;padding-bottom:90px}
.header{background:#185FA5;padding:12px 16px;display:flex;align-items:center;gap:10px}
.h-icon{width:46px;height:46px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.h-title{font-size:18px;font-weight:600;color:#E6F1FB}
.h-sub{font-size:12px;color:rgba(255,255,255,.55);font-family:var(--mono);margin-top:1px}
.content{padding:14px}
.order-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.order-route{font-size:17px;font-weight:600;color:var(--text);margin-bottom:10px}
.order-arrow{color:var(--accent);font-weight:400}
.badges{display:flex;flex-wrap:wrap;gap:6px}
.badge{font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.badge-km{background:var(--accent-light);color:#0C447C}
.badge-ton{background:var(--yellow-bg);color:var(--yellow)}
.badge-cars{background:var(--accent2-light);color:#085041}
.badge-cargo{background:var(--surface2);color:var(--text2)}
.form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.form-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px}
.field{margin-bottom:14px}
.field:last-of-type{margin-bottom:0}
.field-label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:16px;padding:12px 14px;outline:none;transition:border-color .15s, background .15s}
.field-input:focus{border-color:var(--accent);background:white}
.field-input::placeholder{color:var(--text3)}
.field-input:disabled{opacity:.35;cursor:not-allowed}
.field-hint{font-size:12px;color:var(--text3);margin-top:4px}
.price-toggle{display:flex;gap:6px;margin-bottom:12px}
.pt-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-family:var(--font);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.pt-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.pt-btn:active{transform:scale(.97)}
.save-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 14px;background:rgba(245,246,250,.96);border-top:0.5px solid var(--border);backdrop-filter:blur(8px)}
.save-btn{width:100%;background:var(--accent2);border:none;border-radius:12px;color:white;font-family:var(--font);font-size:17px;font-weight:600;padding:16px;cursor:pointer;transition:opacity .15s}
.save-btn:active{opacity:.85}
.save-btn:disabled{opacity:.4;cursor:default}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1d2e;border-radius:20px;padding:8px 18px;font-size:12px;color:white;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px 0;color:var(--text3);font-size:15px}
.error-msg{text-align:center;padding:40px 14px;color:var(--red);font-size:15px}
</style>
</head>
<body>

<div class="header">
  <div class="h-icon">💰</div>
  <div>
    <div class="h-title">Вказати ціну</div>
    <div class="h-sub" id="h-sub">Завантаження...</div>
  </div>
</div>

<div class="content">
  <div id="loading" class="loading">Завантаження заявки...</div>
  <div id="error" class="error-msg" style="display:none"></div>

  <div id="main" style="display:none">
    <div class="order-card">
      <div class="order-route" id="route"></div>
      <div class="badges">
        <span class="badge badge-km" id="b-km"></span>
        <span class="badge badge-ton" id="b-ton"></span>
        <span class="badge badge-cars" id="b-cars"></span>
        <span class="badge badge-cargo" id="b-cargo"></span>
      </div>
    </div>

    <div class="form-card">
      <div class="form-title">Ваша пропозиція</div>

      <div class="field">
        <label class="field-label">Кількість машин</label>
        <input class="field-input" type="number" id="inp-cars" inputmode="numeric" placeholder="Скільки машин ви можете надати">
      </div>

      <div class="field">
        <label class="field-label">Тип ціни</label>
        <div class="price-toggle">
          <div class="pt-btn active" id="pt-ton" onclick="setPriceType('ton')">грн / тонна</div>
          <div class="pt-btn" id="pt-km" onclick="setPriceType('km')">грн / км</div>
        </div>
      </div>

      <div class="field" id="field-ton">
        <label class="field-label">Ціна, грн/тонна</label>
        <input class="field-input" type="number" id="inp-ton" inputmode="decimal" placeholder="Наприклад: 450">
      </div>

      <div class="field" id="field-km" style="display:none">
        <label class="field-label">Ціна, грн/км</label>
        <input class="field-input" type="number" id="inp-km" inputmode="decimal" placeholder="Наприклад: 22">
      </div>
    </div>
  </div>
</div>

<div class="save-wrap">
  <button class="save-btn" id="send-btn" onclick="doSend()" disabled>Відправити</button>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbwHq0BBPHFWsOPw9_t3V74ZCQIji72QdNz4c79NpRrfhYm5f_QCOGolBy7vh1Z3qp7H/exec';
var tg = window.Telegram && window.Telegram.WebApp;
var tgId = '', orderNum = '', priceType = 'ton';
var orderData = null;

if (tg) { tg.ready(); tg.expand(); tgId = String(tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '') || ''; }
if (!tgId) { var p = new URLSearchParams(location.search); tgId = p.get('tg_id') || ''; }

var p2 = new URLSearchParams(location.search);
orderNum = p2.get('order') || '';

document.getElementById('h-sub').textContent = orderNum ? 'Заявка #' + orderNum : 'Заявка не визначена';

if (orderNum) { loadOrder(); } else { showError('Номер заявки не визначено'); }

async function loadOrder() {
  try {
    var url = API + '?action=get_order&order_num=' + encodeURIComponent(orderNum);
    var r = await fetch(url).catch(function() { return null; });
    if (!r) { showError('Немає зв\'язку з сервером'); return; }
    var d = await r.json().catch(function() { return null; });
    if (!d || d.status !== 'ok') { showError('Заявку #' + orderNum + ' не знайдено'); return; }
    orderData = d;
    renderOrder(d);
  } catch(e) { showError('Помилка: ' + e.message); }
}

function renderOrder(d) {
  var from = d.cityFrom + (d.villFrom ? ', ' + d.villFrom : '');
  var to = d.cityTo + (d.villTo ? ', ' + d.villTo : '');
  document.getElementById('route').innerHTML = from + ' <span class="order-arrow">→</span> ' + to;
  document.getElementById('b-km').textContent = (d.distance || '—') + ' км';
  document.getElementById('b-ton').textContent = (d.weight || '—') + ' т';
  document.getElementById('b-cars').textContent = (d.numCars || '—') + ' машин';
  document.getElementById('b-cargo').textContent = d.cargo || '—';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('send-btn').disabled = false;
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').textContent = msg;
  document.getElementById('error').style.display = 'block';
}

function setPriceType(type) {
  priceType = type;
  document.getElementById('pt-ton').className = 'pt-btn' + (type === 'ton' ? ' active' : '');
  document.getElementById('pt-km').className = 'pt-btn' + (type === 'km' ? ' active' : '');
  document.getElementById('field-ton').style.display = type === 'ton' ? 'block' : 'none';
  document.getElementById('field-km').style.display = type === 'km' ? 'block' : 'none';
  if (type === 'ton') { document.getElementById('inp-km').value = ''; }
  else { document.getElementById('inp-ton').value = ''; }
}

async function doSend() {
  var cars = document.getElementById('inp-cars').value.trim();
  var priceTon = document.getElementById('inp-ton').value.trim();
  var priceKm = document.getElementById('inp-km').value.trim();
  var priceVal = priceType === 'ton' ? priceTon : priceKm;

  if (!cars) { toast('⚠️ Вкажіть кількість машин'); return; }
  if (!priceVal) { toast('⚠️ Вкажіть ціну'); return; }

  var btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = 'Відправляємо...';

  var details = cars + ' маш., ' + priceVal + ' грн/' + (priceType === 'ton' ? 'т' : 'км');

  try {
    var url = API
      + '?action=save_price'
      + '&tg_id=' + encodeURIComponent(tgId)
      + '&order_num=' + encodeURIComponent(orderNum)
      + '&cars=' + encodeURIComponent(cars)
      + '&price_value=' + encodeURIComponent(priceVal)
      + '&price_type=' + encodeURIComponent(priceType === 'ton' ? 'за тонну' : 'за км');
    var r = await fetch(url).catch(function() { return null; });

    toast('✅ Вашу ціну відправлено!');
    btn.textContent = 'Відправлено ✓';
    setTimeout(function() { if (tg) tg.close(); }, 1800);
  } catch(e) {
    toast('❌ Помилка: ' + e.message);
    btn.disabled = false; btn.textContent = 'Відправити';
  }
}

function toast(m) {
  var el = document.getElementById('toast');
  el.textContent = m; el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
