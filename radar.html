<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Радар</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --surface2: #222535;
    --border: #2e3347;
    --accent: #4f7cff;
    --accent2: #00d4aa;
    --text: #e8eaf2;
    --text2: #8b90a7;
    --text3: #555a72;
    --green: #00d4aa;
    --yellow: #ffb84d;
    --red: #ff5c5c;
    --radius: 12px;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── Шапка ── */
  .header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(79,124,255,.15);
    border: 1px solid rgba(79,124,255,.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

  /* ── Контент ── */
  .content { padding: 14px 14px 0; }

  /* ── Картка типу радара ── */
  .radar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .15s;
    position: relative;
  }
  .radar-card.selected {
    border-color: var(--accent);
    background: rgba(79,124,255,.05);
  }
  .radar-card-head { display: flex; align-items: center; justify-content: space-between; }
  .radar-card-title { font-size: 14px; font-weight: 600; }
  .radar-card-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ── Тогл ── */
  .toggle {
    width: 44px; height: 26px;
    border-radius: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    position: relative;
    transition: background .2s, border-color .2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: white;
    transition: transform .2s;
  }
  .toggle.on::after { transform: translateX(18px); }

  /* ── Бейдж статусу ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    margin-top: 8px;
  }
  .status-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge-on  { background: rgba(0,212,170,.12); color: var(--green); }
  .badge-off { background: rgba(85,90,114,.15); color: var(--text3); }
  .badge-timer { background: rgba(255,184,77,.12); color: var(--yellow); }

  /* ── Таймер ── */
  .timer-row {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,184,77,.07);
    border: 1px solid rgba(255,184,77,.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 10px;
  }
  .timer-label { font-size: 11px; color: var(--text2); }
  .timer-val { font-size: 13px; font-weight: 600; color: var(--yellow); font-family: var(--mono); }

  /* ── Секція вибору регіонів ── */
  .regions-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    display: none;
  }
  .regions-section.visible { display: block; }
  .section-label {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 10px;
  }

  /* ── Пошук ── */
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 9px 12px 9px 36px;
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  /* ── Дропдаун ── */
  .dropdown {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 8px;
    display: none;
  }
  .dropdown.visible { display: block; }
  .dd-item {
    padding: 9px 12px;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background .1s;
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:active { background: rgba(79,124,255,.1); }
  .dd-match { color: var(--accent); font-weight: 600; }
  .dd-region { font-size: 10px; color: var(--text3); }

  /* ── Список вибраних ── */
  .selected-list { margin-bottom: 10px; }
  .sel-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(79,124,255,.08);
    border: 1px solid rgba(79,124,255,.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 6px;
  }
  .sel-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .sel-remove {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(255,92,92,.15);
    border: none;
    color: var(--red);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Ближні чіпи ── */
  .nearby-label { font-size: 11px; color: var(--accent2); font-weight: 500; margin-bottom: 6px; }
  .nearby-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .nearby-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(0,212,170,.08);
    border: 1px solid rgba(0,212,170,.25);
    color: var(--green);
    cursor: pointer;
    transition: background .1s;
  }
  .nearby-chip:active { background: rgba(0,212,170,.2); }

  /* ── Статистика ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 600; font-family: var(--mono); color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ── Кнопка збереження ── */
  .save-btn {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 14px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .save-btn button {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .save-btn button:active { opacity: .85; }
  .save-btn button:disabled { opacity: .4; cursor: default; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  .empty-sel { font-size: 12px; color: var(--text3); text-align: center; padding: 10px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📡</div>
  <div>
    <div class="header-title">Радар заявок</div>
    <div class="header-sub" id="header-sub">завантаження...</div>
  </div>
</div>

<div class="content">

  <!-- Статистика -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-today">—</div>
      <div class="stat-label">заявок сьогодні</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)">+60с</div>
      <div class="stat-label">пріоритет</div>
    </div>
  </div>

  <!-- Тип 1 -->
  <div class="radar-card selected" id="card1" onclick="selectType(1)">
    <div class="radar-card-head">
      <div>
        <div class="radar-card-title">⚡️ Тип 1 · по базі</div>
        <div class="radar-card-sub" id="base-city-label">ваше місто · постійно</div>
      </div>
      <div class="toggle on" id="toggle1"></div>
    </div>
    <div id="badge1"><span class="status-badge badge-on">активний</span></div>
  </div>

  <!-- Тип 2 -->
  <div class="radar-card" id="card2" onclick="selectType(2)">
    <div class="radar-card-head">
      <div>
        <div class="radar-card-title">🗺 Тип 2 · по областях</div>
        <div class="radar-card-sub">вибрані регіони · 48 годин</div>
      </div>
      <div class="toggle off" id="toggle2"></div>
    </div>
    <div id="badge2"><span class="status-badge badge-off">вимкнений</span></div>
    <div class="timer-row" id="timer-row" style="display:none">
      <span class="timer-label">Вимкнеться через</span>
      <span class="timer-val" id="timer-val">48:00</span>
    </div>
  </div>

  <!-- Вибір регіонів (тільки для типу 2) -->
  <div class="regions-section" id="regions-section">
    <div class="section-label">Пошук регіонів</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        class="search-input"
        id="region-search"
        placeholder="Введіть місто або область..."
        autocomplete="off"
        oninput="onSearchInput(this.value)"
      >
    </div>
    <div class="dropdown" id="dropdown"></div>

    <div class="section-label" style="margin-top:10px">Вибрано</div>
    <div class="selected-list" id="selected-list">
      <div class="empty-sel">Ще нічого не вибрано</div>
    </div>

    <div id="nearby-block" style="display:none">
      <div class="nearby-label">Ближні — додати?</div>
      <div class="nearby-chips" id="nearby-chips"></div>
    </div>
  </div>

</div>

<!-- Кнопка зберегти -->
<div class="save-btn">
  <button id="save-btn" onclick="saveRadar()">Зберегти налаштування</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Дані ────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4pPNDYlJbH4vHhxKwazSNTfkhaame_ynQQf3srSRU6a06st7nAAestHAcRZfoObzu/exec';

const REGIONS = [
  'Вінниця','Дніпро','Донецьк','Житомир','Запоріжжя','Івано-Франківськ',
  'Київ','Кропивницький','Луганськ','Луцьк','Львів','Миколаїв',
  'Одеса','Полтава','Рівне','Суми','Тернопіль','Ужгород',
  'Харків','Херсон','Хмельницький','Черкаси','Чернівці','Чернігів','Сімферополь'
];

// Сусідні регіони для підказок
const NEARBY = {
  'Харків':     ['Полтава','Суми','Дніпро'],
  'Київ':       ['Чернігів','Житомир','Черкаси','Полтава'],
  'Дніпро':     ['Запоріжжя','Харків','Кропивницький','Полтава'],
  'Одеса':      ['Миколаїв','Херсон','Вінниця'],
  'Львів':      ['Івано-Франківськ','Тернопіль','Луцьк','Ужгород'],
  'Запоріжжя':  ['Дніпро','Херсон','Донецьк'],
  'Полтава':    ['Харків','Дніпро','Київ','Суми'],
  'Миколаїв':   ['Одеса','Херсон','Кропивницький'],
  'Вінниця':    ['Хмельницький','Черкаси','Київ','Житомир'],
  'Суми':       ['Харків','Полтава','Чернігів'],
  'Херсон':     ['Миколаїв','Запоріжжя','Одеса'],
  'Чернігів':   ['Київ','Суми','Житомир'],
  'Житомир':    ['Київ','Вінниця','Чернігів','Рівне'],
  'Рівне':      ['Луцьк','Житомир','Тернопіль'],
  'Луцьк':      ['Рівне','Львів','Тернопіль'],
  'Тернопіль':  ['Львів','Хмельницький','Рівне','Івано-Франківськ'],
  'Хмельницький':['Вінниця','Тернопіль','Житомир'],
  'Черкаси':    ['Київ','Полтава','Кропивницький','Вінниця'],
  'Кропивницький':['Дніпро','Черкаси','Миколаїв'],
  'Чернівці':   ['Івано-Франківськ','Тернопіль'],
  'Івано-Франківськ':['Львів','Тернопіль','Ужгород','Чернівці'],
  'Ужгород':    ['Львів','Івано-Франківськ'],
};

let currentType    = 1;
let selectedRegions = [];
let baseCity       = '';
let tgId           = '';
let expiresAt      = null;
let todayCount     = 0;

// ── Ініціалізація ────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tgId = tg.initDataUnsafe?.user?.id || '';
}

// Якщо tg_id у URL (fallback для тестування)
if (!tgId) {
  const params = new URLSearchParams(window.location.search);
  tgId = params.get('tg_id') || '';
}

document.getElementById('header-sub').textContent = tgId ? 'ID: ' + tgId : 'немає ID';

if (tgId) loadRadar();

// ── Завантаження поточних налаштувань ────────────────────────
async function loadRadar() {
  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({action: 'get_radar', telegram_id: String(tgId)})
    });
    const data = await resp.json();
    if (data.status === 'ok') {
      baseCity = data.regions ? data.regions.split(',')[0].trim() : '';
      document.getElementById('base-city-label').textContent =
        (baseCity || 'ваше місто') + ' · постійно';

      if (data.radar_type === '2' && data.radar_status === 'активен') {
        currentType = 2;
        selectedRegions = data.regions
          ? data.regions.split(',').map(r => r.trim()).filter(Boolean)
          : [];
        expiresAt = data.expires_at ? new Date(parseDate(data.expires_at)) : null;
        renderType2Active();
      } else {
        currentType = 1;
        renderType1Active();
      }
    }
  } catch(e) {
    console.log('loadRadar error:', e);
  }
  renderSelectedList();
  updateNearby();
}

function parseDate(str) {
  // dd.MM.yyyy HH:mm → Date
  if (!str) return null;
  const parts = str.split(' ');
  const dmy = parts[0].split('.');
  const hm  = parts[1] ? parts[1].split(':') : ['0','0'];
  return new Date(+dmy[2], +dmy[1]-1, +dmy[0], +hm[0], +hm[1]);
}

// ── Рендер стану ─────────────────────────────────────────────
function renderType1Active() {
  document.getElementById('card1').classList.add('selected');
  document.getElementById('card2').classList.remove('selected');
  document.getElementById('toggle1').className = 'toggle on';
  document.getElementById('toggle2').className = 'toggle off';
  document.getElementById('badge1').innerHTML = '<span class="status-badge badge-on">активний</span>';
  document.getElementById('badge2').innerHTML = '<span class="status-badge badge-off">вимкнений</span>';
  document.getElementById('timer-row').style.display = 'none';
  document.getElementById('regions-section').classList.remove('visible');
}

function renderType2Active() {
  document.getElementById('card1').classList.remove('selected');
  document.getElementById('card2').classList.add('selected');
  document.getElementById('toggle1').className = 'toggle off';
  document.getElementById('toggle2').className = 'toggle on';
  document.getElementById('badge1').innerHTML = '<span class="status-badge badge-off">вимкнений</span>';
  document.getElementById('badge2').innerHTML = '<span class="status-badge badge-timer">активний · 48г</span>';
  document.getElementById('timer-row').style.display = 'flex';
  document.getElementById('regions-section').classList.add('visible');
  if (expiresAt) startTimer(expiresAt);
}

// ── Вибір типу ───────────────────────────────────────────────
function selectType(type) {
  currentType = type;
  if (type === 1) {
    renderType1Active();
  } else {
    expiresAt = new Date(Date.now() + 48*60*60*1000);
    renderType2Active();
  }
}

// ── Таймер ───────────────────────────────────────────────────
function startTimer(expires) {
  updateTimerDisplay(expires);
  clearInterval(window._timerInterval);
  window._timerInterval = setInterval(() => {
    updateTimerDisplay(expires);
  }, 60000);
}

function updateTimerDisplay(expires) {
  const diff = expires - Date.now();
  if (diff <= 0) {
    document.getElementById('timer-val').textContent = 'вимкнено';
    return;
  }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  document.getElementById('timer-val').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

// ── Пошук регіонів ───────────────────────────────────────────
function onSearchInput(val) {
  const dd = document.getElementById('dropdown');
  if (!val.trim()) { dd.classList.remove('visible'); return; }

  const q = val.toLowerCase();
  const matches = REGIONS.filter(r =>
    r.toLowerCase().includes(q) && !selectedRegions.includes(r)
  );

  if (!matches.length) { dd.classList.remove('visible'); return; }

  dd.innerHTML = matches.slice(0, 6).map(r => {
    const idx = r.toLowerCase().indexOf(q);
    const hi  = r.slice(0, idx) +
      '<span class="dd-match">' + r.slice(idx, idx + val.length) + '</span>' +
      r.slice(idx + val.length);
    return `<div class="dd-item" onclick="addRegion('${r}')">
      <span>${hi}</span>
    </div>`;
  }).join('');
  dd.classList.add('visible');
}

function addRegion(name) {
  if (!selectedRegions.includes(name)) {
    selectedRegions.push(name);
  }
  document.getElementById('region-search').value = '';
  document.getElementById('dropdown').classList.remove('visible');
  renderSelectedList();
  updateNearby();
}

function removeRegion(name) {
  selectedRegions = selectedRegions.filter(r => r !== name);
  renderSelectedList();
  updateNearby();
}

function renderSelectedList() {
  const el = document.getElementById('selected-list');
  if (!selectedRegions.length) {
    el.innerHTML = '<div class="empty-sel">Ще нічого не вибрано</div>';
    return;
  }
  el.innerHTML = selectedRegions.map(r =>
    `<div class="sel-item">
      <span class="sel-name">${r}</span>
      <button class="sel-remove" onclick="removeRegion('${r}')">✕</button>
    </div>`
  ).join('');
}

function updateNearby() {
  const block = document.getElementById('nearby-block');
  const chips = document.getElementById('nearby-chips');

  // Збираємо сусідів для всіх вибраних регіонів
  const suggestions = new Set();
  const sources = selectedRegions.length ? selectedRegions : (baseCity ? [baseCity] : []);
  sources.forEach(r => {
    (NEARBY[r] || []).forEach(n => {
      if (!selectedRegions.includes(n)) suggestions.add(n);
    });
  });

  if (!suggestions.size) { block.style.display = 'none'; return; }

  chips.innerHTML = [...suggestions].slice(0,6).map(r =>
    `<div class="nearby-chip" onclick="addRegion('${r}')">+ ${r}</div>`
  ).join('');
  block.style.display = 'block';
}

// ── Збереження ───────────────────────────────────────────────
async function saveRadar() {
  if (!tgId) { showToast('❌ Не вдалося визначити ваш ID'); return; }
  if (currentType === 2 && !selectedRegions.length) {
    showToast('⚠️ Виберіть хоча б один регіон');
    return;
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Зберігаємо...';

  const regions = currentType === 1
    ? baseCity
    : selectedRegions.join(',');

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({
        action:      'save_radar',
        telegram_id: String(tgId),
        radar_type:  String(currentType),
        regions:     regions,
      })
    });
    const result = await resp.json();
    if (result.status === 'ok') {
      showToast('✅ Радар збережено!');
      if (tg) setTimeout(() => tg.close(), 1200);
    } else {
      showToast('❌ Помилка: ' + (result.msg || 'невідома'));
    }
  } catch(e) {
    showToast('❌ Помилка з\'єднання');
  }

  btn.disabled = false;
  btn.textContent = 'Зберегти налаштування';
}

// ── Toast ────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
